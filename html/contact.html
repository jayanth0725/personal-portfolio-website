<!DOCTYPE html>
<html lang="en">
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/style.css">
        <link rel="icon" type="image/png" href="../images/favicon.png">
        <meta charset="utf-8">
        <title>Contact</title>
        <script src="../js/flash-theme.js"></script>
    </head>
    <body>
        <a href="#main-content" class="skip-link">Skip to main content</a>

        <header>
            <nav class="navbar">
                <a href="home.html">Home</a>
                <a href="about.html">About</a>
                <a href="projects.html">Projects</a>
                <button id="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">🌙</button>
            </nav>
        </header>
        
        <main id="main-content">
            <h1 class="page-title">Contact</h1>
            <p class="contact-message">Any questions/suggestions?</p>
            <p class="contact-message">Fill out the below form to get in touch with me!</p>
            <form id="contact-form" novalidate>
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" aria-describedby="name-error" required>
                    <small id="name-error" class="error" aria-live="polite"></small>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" aria-describedby="email-error" required>
                    <small id="email-error" class="error" aria-live="polite"></small>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" aria-describedby="message-error" required></textarea>
                    <small id="message-error" class="error" aria-live="polite"></small>
                </div>

                <button type="submit" class="form-btn">Send</button>
            </form>           
        </main>
        
        
        <div id="form-success" class="form-hidden" aria-live="polite">
            Your message has been sent successfully!
        </div>

        <footer>
            <p>©️ 2026 Jayanth Raveendra. Built for academic purposes</p>
            <p>Built with HTML, CSS and vanilla Javascript.</p>
            <p>Last updated: March 2026</p>
        </footer>

        <script src="../js/toggle.js"></script>
        <script src="../js/contact-form.js"></script>
    </body>
</html>
